<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Anemic2D</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div id="preloader">
        <img src="icons/icon.ico" alt="Anemic2D" class="preloader-icon">
        <div class="preloader-title">Anemic2D</div>
        <div class="preloader-status">Initializing...</div>
        <div class="preloader-bar-container">
            <div class="preloader-bar" id="preloaderBar"></div>
        </div>
        <div class="preloader-percent" id="preloaderPercent">0%</div>
    </div>
    <div id="homeScreen" class="screen active">
        <div class="splash-container">
            <div class="splash-box">
                <div class="splash-header">
                    <h1>Anemic2D</h1>
                    <div class="splash-subtitle">Sprite Sheet Editor</div>
                </div>
                <div class="splash-options">
                    <div class="splash-option" id="newProjectOption">
                        <h3>New Project</h3>
                        <p>Create a new sprite sheet project</p>
                    </div>
                    <div class="splash-option" id="recentProjectsOption">
                        <h3>Recent Projects</h3>
                        <p>Open a recent project file</p>
                    </div>
                </div>
                <div class="splash-form" id="newProjectForm">
                    <div class="form-group">
                        <label>Project Name</label>
                        <input type="text" id="projectName" placeholder="MySpriteSheet">
                    </div>
                    <div class="form-group">
                        <label>Project Location</label>
                        <div class="form-row">
                            <input type="text" id="projectLocation" placeholder="Select project folder..." readonly>
                            <button id="browseBtn" class="secondary-btn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2H5a2 2 0 00-2-2z"/>
                                    <path d="M8 5a2 2 0 012-2h4a2 2 0 012 2v2H8V5z"/>
                                </svg>
                                BROWSE
                            </button>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Canvas Size</label>
                            <select id="canvasSize">
                                <option value="256">256x256</option>
                                <option value="512">512x512</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Grid Size</label>
                            <select id="gridSize">
                                <option value="16">16px</option>
                                <option value="32" selected>32px</option>
                                <option value="64">64px</option>
                            </select>
                        </div>
                    </div>
                    <button id="createProject" class="primary-btn">Create Project</button>
                </div>
                <div class="recent-projects" id="recentProjects">
                    <div id="recentProjectsList"></div>
                </div>
            </div>
        </div>
    </div>
    <div id="editorScreen" class="screen">
        <div class="app">
            <div class="toolbar">
                <div class="toolbar-section">
                    <div class="menu-bar">
                        <div class="menu-dropdown" id="fileMenuDropdown">
                            <button class="menu-btn" id="fileMenuBtn">File</button>
                            <div class="menu-content" id="fileMenu">
                                <button class="menu-item" id="menuNewProject"><span class="menu-item-label">New Project</span><span class="menu-item-shortcut"></span></button>
                                <div class="menu-submenu">
                                    <button class="menu-item" id="menuRecentProjectsBtn"><span class="menu-item-label">Recent Projects</span><span class="menu-item-shortcut"></span></button>
                                    <div class="menu-submenu-content" id="recentProjectsMenu"></div>
                                </div>
                                <button class="menu-item" id="menuBackToHome"><span class="menu-item-label">Back to Home</span><span class="menu-item-shortcut"></span></button>
                            </div>
                        </div>
                        <div class="menu-dropdown" id="editMenuDropdown">
                            <button class="menu-btn" id="editMenuBtn">Edit</button>
                            <div class="menu-content" id="editMenu">
                                <button class="menu-item" id="menuUndo"><span class="menu-item-label">Undo</span><span class="menu-item-shortcut">Ctrl+Z</span></button>
                                <button class="menu-item" id="menuRedo"><span class="menu-item-label">Redo</span><span class="menu-item-shortcut">Ctrl+Y</span></button>
                                <button class="menu-item" id="menuCopy"><span class="menu-item-label">Copy</span><span class="menu-item-shortcut">Ctrl+C</span></button>
                                <button class="menu-item" id="menuPaste"><span class="menu-item-label">Paste</span><span class="menu-item-shortcut">Ctrl+V</span></button>
                                <button class="menu-item" id="menuDuplicate"><span class="menu-item-label">Duplicate</span><span class="menu-item-shortcut">Ctrl+D</span></button>
                                <button class="menu-item" id="menuFocus"><span class="menu-item-label">Focus Canvas</span><span class="menu-item-shortcut">F</span></button>
                            </div>
                        </div>
                        <div class="menu-dropdown" id="exportMenuDropdown">
                            <button class="menu-btn" id="exportMenuBtn">Export</button>
                            <div class="menu-content" id="exportMenu">
                                <button class="menu-item" id="menuExportPng"><span class="menu-item-label">Export as PNG</span><span class="menu-item-shortcut"></span></button>
                                <button class="menu-item" id="menuExportJpg"><span class="menu-item-label">Export as JPG</span><span class="menu-item-shortcut"></span></button>
                                <button class="menu-item" id="menuExportSvg"><span class="menu-item-label">Export as SVG</span><span class="menu-item-shortcut"></span></button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="toolbar-section">
                    <button id="zoomInBtn" class="icon-btn" title="Zoom In">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                            <line x1="11" y1="8" x2="11" y2="14"/>
                            <line x1="8" y1="11" x2="14" y2="11"/>
                        </svg>
                    </button>
                    <button id="zoomOutBtn" class="icon-btn" title="Zoom Out">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                            <line x1="8" y1="11" x2="14" y2="11"/>
                        </svg>
                    </button>
                    <button id="zoomResetBtn" class="icon-btn" title="Reset Zoom">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M3 12a9 9 0 0115-6.7L21 8"/>
                            <path d="M21 3v5h-5"/>
                            <path d="M21 12a9 9 0 01-15 6.7L3 16"/>
                            <path d="M3 21v-5h5"/>
                        </svg>
                    </button>
                    <span id="zoomLevel">100%</span>
                </div>
                <div class="toolbar-section">
                    <span id="activeProjectName">Untitled</span>
                </div>
            </div>
            <div class="workspace">
                <div class="sidebar">
                    <div class="panel">
                        <div class="panel-header">Layers</div>
                        <div class="panel-content">
                            <div id="layerList"></div>
                        </div>
                    </div>
                    <div class="panel">
                        <div class="panel-header">Properties</div>
                        <div class="panel-content">
                            <div id="propertiesPanel"></div>
                        </div>
                    </div>
                </div>
                <div class="viewport-container">
                    <div class="viewport" id="viewport">
                        <canvas id="canvas"></canvas>
                        <div class="drop-zone" id="dropZone">Drop PNG files here</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="spriteContextMenu" class="context-menu">
        <button class="context-menu-item" id="contextResizeBtn">Resize</button>
        <button class="context-menu-item" id="contextDuplicateBtn">Duplicate</button>
        <button class="context-menu-item" id="contextDeleteBtn">Delete</button>
        <button class="context-menu-item" id="contextAlignLeftBtn">Align Left</button>
        <button class="context-menu-item" id="contextAlignTopBtn">Align Top</button>
        <button class="context-menu-item" id="contextAlignCenterBtn">Align Center</button>
    </div>
    <div id="spriteResizeModal" class="modal-overlay">
        <div class="modal-window">
            <div class="modal-header">Resize Sprite</div>
            <div class="modal-body">
                <div class="modal-left">
                    <canvas id="resizePreviewCanvas" width="360" height="360"></canvas>
                </div>
                <div class="modal-right">
                    <div class="modal-field">
                        <div class="modal-label">Width</div>
                        <select id="resizeWidthSelect">
                            <option value="16">16</option>
                            <option value="32">32</option>
                            <option value="64">64</option>
                            <option value="128">128</option>
                            <option value="256">256</option>
                            <option value="512">512</option>
                        </select>
                    </div>
                    <div class="modal-field">
                        <div class="modal-label">Height</div>
                        <select id="resizeHeightSelect">
                            <option value="16">16</option>
                            <option value="32">32</option>
                            <option value="64">64</option>
                            <option value="128">128</option>
                            <option value="256">256</option>
                            <option value="512">512</option>
                        </select>
                    </div>
                    <div class="modal-actions">
                        <button id="resizeSaveBtn">Save</button>
                        <button id="resizeCancelBtn">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="img/imageLoader.js"></script>
    <script src="packer/history.js"></script>
    <script src="packer/gizmo.js"></script>
    <script src="exporter/imageExport.js"></script>
    <script>
        (() => {
            const projectData = localStorage.getItem('anemic2d_project');
            const homeScreen = document.getElementById('homeScreen');
            const editorScreen = document.getElementById('editorScreen');
            if (!projectData) {
                homeScreen.classList.add('active');
                editorScreen.classList.remove('active');
            } else {
                homeScreen.classList.remove('active');
                editorScreen.classList.add('active');
            }
        })();
    </script>
    <script src="src/renderer.js"></script>
</body>
</html>
